server:
  port: 80
spring:
  application:
    name: mes
  profiles:
    include:
      - secret # application-secret.yml - Supabase
      - kakao # application-kakao.yml - Kakao(REST API KEY, Redirect URI - KAKAO Developer 사이트 + vercel 사이트에도 환경변수 등록완료)
  datasource:
    #### PostgreSQL
    driver-class-name: org.postgresql.Driver
    #url: jdbc:postgresql://localhost:5432/postgres?currentSchema=mes  # 여기에 스키마명 입력
    #url: jdbc:postgresql://localhost:5432/mes # 디비버 PostgreSQL > mes 계정에 직접붙기 방식
    #username: mes # 디비버 PostgreSQL 직접붙기 방식
    #password: mesel9405 # 디비버 PostgreSQL 직접붙기 방식

    # Supabase 연동방식 - 클라우드 DB 서버
    # 5432 포트(Direct Connection) - IPv4 제한됨.. IPv6 기반임..
    # 6543 포트(Transaction Pooler)
    # ?currentSchema=mes,public :: mes,public 순서로 세팅 시, JPA나 MyBatis에서 테이블 이름만 썼을 때 mes 스키마를 먼저 뒤지고, 없으면 public을 찾음
    # 근데 6543포트에선 겟방식을 지원하지 않음.. 그래서 디비버 툴이나 Supabase SQL Editor에서 설정함
    # ALTER ROLE postgres SET search_path TO mes, public;
    # url: jdbc:postgresql://db.bvqqrijtzvsqtuboasiu.supabase.co:6543/postgres?currentSchema=mes,public
    url: jdbc:postgresql://db.bvqqrijtzvsqtuboasiu.supabase.co:6543/postgres

    # (연결안정성 추가옵션)
    # Supabase는 클라우드 DB라 연결이 유휴 상태일 때 끊어질 수 있음, 이를 방지하기 위해 hikari 설정을 조금 추가
    hikari:
      maximum-pool-size: 4 # 3->4
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      # 연결이 살아있는지 확인하는 쿼리
      connection-test-query: SELECT 1
      #추가
      keepalive-time: 30000

    #### ORACLE
    #driver-class-name: oracle.jdbc.OracleDriver
    #url: jdbc:oracle:thin:@localhost:1521/xe
    #username: mes
    #password:
  jpa:
    hibernate:
      ddl-auto: update # 테이블 자동 생성/수정 (운영에선 none 처리가 나음)
    show-sql: true # 실행되는 SQL 로그 출력
    properties:
      hibernate:
        format_sql: true
  mybatis:
    mapper-locations: classpath:mapper/*.xml
    configuration:
      map-underscore-to-camel-case: true # USER_ID -> userId (camelCase 변환)
      log-impl: org.apache.ibatis.logging.stdout.StdOutImpl


  #profiles: dev
#dev
app:
  allow-domain-ip:
    # Next.js + TypeScript
    - http://localhost:3000

    # 바닐라 리액트..
    #- http://localhost:5173
    #- http://127.0.0.1:5173
    #- http://192.168.219.100:5173
  is-real: false

#real
#app:
